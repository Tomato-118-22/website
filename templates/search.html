<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" href="/static/logo.jpg">
    <title>検索 | トマト</title>
</head>

<body>
    <div class="centre">
        <div class="black">
            <h1>検索</h1>
        </div>

        <section class="contact-info mt-lg" style="max-width: 600px;">
            <h3>キーワードを入力して検索</h3>
            <form action="/search/result" method="get" style="text-align: left; margin-top: var(--spacing-md);">
                <div style="margin-bottom: var(--spacing-md);">
                    <label style="display: block; margin-bottom: var(--spacing-xs); font-weight: 500;">キーワード</label>
                    <input type="text" name="q" placeholder="検索キーワードを入力"
                        style="padding: var(--spacing-sm); border: 1px solid var(--color-border); border-radius: var(--border-radius); width: 100%; font-family: var(--font-family);">
                </div>

                <div style="margin-bottom: var(--spacing-md); display: flex; gap: var(--spacing-md);">
                    <div style="flex: 1;">
                        <label
                            style="display: block; margin-bottom: var(--spacing-xs); font-weight: 500;">投稿機関(開始)</label>
                        <input type="date" name="start_date"
                            style="padding: var(--spacing-sm); border: 1px solid var(--color-border); border-radius: var(--border-radius); width: 100%; font-family: var(--font-family);">
                    </div>
                    <div style="flex: 1;">
                        <label
                            style="display: block; margin-bottom: var(--spacing-xs); font-weight: 500;">投稿期間(終了)</label>
                        <input type="date" name="end_date"
                            style="padding: var(--spacing-sm); border: 1px solid var(--color-border); border-radius: var(--border-radius); width: 100%; font-family: var(--font-family);">
                    </div>
                </div>

                <div style="margin-bottom: var(--spacing-md);">
                    <label style="display: block; margin-bottom: var(--spacing-xs); font-weight: 500;">コンテンツの種類</label>
                    <select name="type"
                        style="padding: var(--spacing-sm); border: 1px solid var(--color-border); border-radius: var(--border-radius); width: 100%; font-family: var(--font-family);">
                        <option value="all">すべて</option>
                        <option value="article">記事のみ</option>
                        <option value="video">動画のみ</option>
                    </select>
                </div>

                <div style="text-align: center;">
                    <button type="submit" class="btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            style="vertical-align: middle;">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                        検索
                    </button>
                    <a href="/" class="btn btn-outline" style="margin-left: var(--spacing-sm);">キャンセル</a>
                </div>
            </form>
        </section>
    </div>

    <footer class="right">
        <p class="black">Copylight© 2024-2026 Tomato All rights reserved.</p>
    </footer>
</body>

</html>
