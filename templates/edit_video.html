<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" href="/static/logo.jpg">
    <title>動画記事編集 | トマト</title>
</head>

<body>
    <div class="centre">
        <div class="black">
            <h1>動画記事編集</h1>
        </div>

        <section class="contact-info mt-lg" style="max-width: 800px;">
            <h3>動画記事を編集</h3>
            <form method="post" enctype="multipart/form-data" style="text-align: left;">
                {% if error %}
                <p style="color: #e74c3c; margin-bottom: var(--spacing-md); text-align: center; font-weight: bold;">{{
                    error }}</p>
                {% endif %}
                <div style="margin-bottom: var(--spacing-md);">
                    <label for="image_data" style="display: block; margin-bottom: var(--spacing-xs); font-weight: 500;">
                        画像(変更する場合のみ)</label>
                    {% if video['image_name'] %}
                    <div style="margin-bottom: var(--spacing-sm);">
                        <p style="font-size: 0.9em; color: var(--color-text-light);">現在の画像: {{ video['image_name'] }}
                        </p>
                        <img src="/uploads/{{ video['image_name'] }}" alt="現在の画像"
                            style="max-width: 200px; max-height: 150px; object-fit: cover; border-radius: var(--border-radius);">
                    </div>
                    {% endif %}
                    <input type="file" id="image_data" name="image_data"
                        style="padding: var(--spacing-sm); border: 1px solid var(--color-border); border-radius: var(--border-radius); width: 100%;">
                </div>

                <div style="margin-bottom: var(--spacing-md);">
                    <label style="display: block; margin-bottom: var(--spacing-xs); font-weight: 500;">
                        動画ID</label>
                    <input type="text" value="{{ video['video_id'] }}" disabled
                        style="padding: var(--spacing-sm); border: 1px solid var(--color-border); border-radius: var(--border-radius); width: 100%; font-family: var(--font-family); background-color: #f5f5f5; color: #888;">
                </div>

                <div style="margin-bottom: var(--spacing-md);">
                    <label for="title" style="display: block; margin-bottom: var(--spacing-xs); font-weight: 500;">
                        タイトル</label>
                    <input type="text" id="title" name="title" value="{{ video['title'] }}" required
                        style="padding: var(--spacing-sm); border: 1px solid var(--color-border); border-radius: var(--border-radius); width: 100%; font-family: var(--font-family);">
                </div>

                <div style="margin-bottom: var(--spacing-md);">
                    <label for="categories" style="display: block; margin-bottom: var(--spacing-xs); font-weight: 500;">
                        カテゴリ(最大5個)</label>
                    <input type="text" id="categories" name="categories" value="{{ video['categories_str'] }}"
                        placeholder="カテゴリ1, カテゴリ2" required
                        style="padding: var(--spacing-sm); border: 1px solid var(--color-border); border-radius: var(--border-radius); width: 100%; font-family: var(--font-family);">
                </div>

                <div style="margin-bottom: var(--spacing-md);">
                    <label for="tags" style="display: block; margin-bottom: var(--spacing-xs); font-weight: 500;">
                        タグ</label>
                    <input type="text" id="tags" name="tags" value="{{ video['tags_str'] }}" placeholder="タグ1, タグ2"
                        style="padding: var(--spacing-sm); border: 1px solid var(--color-border); border-radius: var(--border-radius); width: 100%; font-family: var(--font-family);">
                </div>

                <div style="margin-bottom: var(--spacing-md);">
                    <label for="main_text"
                        style="display: block; margin-bottom: var(--spacing-xs); font-weight: 500;">本文</label>
                    <textarea id="main_text" name="main_text" rows="15" required
                        style="padding: var(--spacing-sm); border: 1px solid var(--color-border); border-radius: var(--border-radius); width: 100%; font-family: var(--font-family); resize: vertical;">{{ video['main_text'] }}</textarea>
                </div>

                <div style="text-align: center;">
                    <button type="submit" class="btn">保存する</button>
                    <a href="/video" class="btn btn-outline" style="margin-left: var(--spacing-sm);">キャンセル</a>
                </div>
            </form>
        </section>
    </div>

    <footer class="right">
        <p class="black">Copylight© 2024-2026 Tomato All rights reserved.</p>
    </footer>
</body>

</html>
